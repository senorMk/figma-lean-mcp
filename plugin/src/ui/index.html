<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px; background: #1e1e1e; color: #e0e0e0; height: 100vh;
      }
      .wrap { display: flex; flex-direction: column; height: 100%; padding: 16px; gap: 12px; }
      .info { display: flex; flex-direction: column; gap: 8px; flex: 1; }
      .row { display: flex; justify-content: space-between; align-items: center; }
      .label { color: #888; }
      .val { font-weight: 500; max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .addr {
        background: none; border: none; color: #666; font: 10px monospace;
        cursor: pointer; padding: 2px 4px; border-radius: 4px;
      }
      .addr:hover { color: #aaa; background: #2a2a2a; }
      .badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
      .badge.on { background: #1a472a; color: #4ade80; }
      .badge.off { background: #3a1a1a; color: #f87171; }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: #f87171; }
      .dot.on { background: #4ade80; }
      .settings { display: none; align-items: center; gap: 6px; flex: 1; }
      .settings.show { display: flex; }
      input {
        background: #2a2a2a; border: 1px solid #444; border-radius: 4px; color: #e0e0e0;
        font: 10px monospace; padding: 2px 4px; outline: none;
      }
      #host { width: 74px; } #port { width: 38px; }
      button.icon { background: none; border: none; cursor: pointer; font-size: 11px; padding: 1px 3px; }
      #apply { color: #4ade80; } #cancel { color: #f87171; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="info">
        <div class="row"><span class="label">File</span><span class="val" id="file">—</span></div>
        <div class="row"><span class="label">Page</span><span class="val" id="page">—</span></div>
        <div class="row"><span class="label">Selection</span><span class="val" id="sel">0 node(s)</span></div>
      </div>
      <div class="footer">
        <button class="addr" id="addrBtn">127.0.0.1:1996</button>
        <div class="settings" id="settings">
          <input id="host" placeholder="127.0.0.1" />
          <span style="color:#666">:</span>
          <input id="port" placeholder="1996" />
          <button class="icon" id="apply">✓</button>
          <button class="icon" id="cancel">✕</button>
        </div>
        <div class="badge off" id="badge"><span class="dot" id="dot"></span><span id="status">Disconnected</span></div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
